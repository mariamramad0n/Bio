<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@eng_mariam ✿ links</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,500;1,500;1,600&family=Quicksand:wght@500;600;700&family=Cairo:wght@500;600;700&display=swap');

  :root{
    --blush:#dce5d1;
    --blush-deep:#a9bd97;
    --rose:#6d8259;
    --beige:#f3efe0;
    --lavender:#cddabf;
    --lavender-deep:#9cb187;
    --cream:#fdfbf1;
    --ink:#4a4636;
    --ink-soft:#6b7562;
    --glass:rgba(255,255,255,0.55);
    --glass-border:rgba(255,255,255,0.75);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    font-family:'Quicksand','Cairo',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 8%, #eef3e6 0%, transparent 45%),
      radial-gradient(circle at 85% 18%, #e6ecdc 0%, transparent 40%),
      radial-gradient(circle at 20% 85%, #f0f4e9 0%, transparent 45%),
      linear-gradient(160deg, #f5f7ee 0%, #eef3e5 45%, #e6ecdb 100%);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- floating decoration layer ---------- */
  #deco{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
  }
  .deco-item{
    position:absolute;
    opacity:0.55;
    animation-name:drift;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }
  @keyframes drift{
    0%   { transform:translate(0,0) rotate(0deg); }
    25%  { transform:translate(12px,-22px) rotate(6deg); }
    50%  { transform:translate(-6px,-40px) rotate(-4deg); }
    75%  { transform:translate(-14px,-14px) rotate(3deg); }
    100% { transform:translate(0,0) rotate(0deg); }
  }
  @keyframes flutter{
    0%,100%{ transform:scaleX(1) rotate(0deg); }
    50%{ transform:scaleX(0.75) rotate(8deg); }
  }

  .orb{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    z-index:0;
    animation:orbfloat 18s ease-in-out infinite;
  }
  @keyframes orbfloat{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(20px,-30px) scale(1.1); }
  }

  /* ---------- layout shell ---------- */
  .wrap{
    position:relative;
    z-index:2;
    max-width:460px;
    margin:0 auto;
    padding:52px 20px 40px;
  }

  /* ---------- hero ---------- */
  .hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    animation:fadeUp .8s ease both;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .avatar-frame{
    position:relative;
    width:130px;
    height:130px;
  }
  .avatar-frame::before{
    content:"";
    position:absolute;
    inset:-9px;
    border-radius:50%;
    border:2px dashed var(--blush-deep);
    animation:spin 30s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    box-shadow:0 10px 30px -8px rgba(120,132,68,0.45);
    border:4px solid var(--cream);
  }
  .sparkle-tl{
    position:absolute;
    top:-6px; left:-10px;
    font-size:20px;
    animation:twinkle 2.4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.3; transform:scale(0.85); }
    50%{ opacity:1; transform:scale(1.15); }
  }

  .username{
    margin-top:20px;
    font-family:'Dancing Script', cursive;
    font-weight:700;
    font-size:40px;
    color:var(--rose);
  }

  .quote{
    margin-top:6px;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:500;
    font-size:14.5px;
    color:var(--ink-soft);
    max-width:280px;
    line-height:1.6;
  }
  .quote-ar{
    font-family:'Cairo', sans-serif;
    font-size:12.5px;
    color:var(--blush-deep);
    margin-top:2px;
  }

  .bloom{
    margin-top:14px;
    font-size:22px;
    animation:bloom 2.6s ease-in-out infinite;
  }
  @keyframes bloom{
    0%,100%{ transform:scale(1) rotate(0deg); }
    50%{ transform:scale(1.18) rotate(8deg); }
  }

  /* ---------- socials (arc / necklace) ---------- */
  .socials{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:14px;
    margin-top:34px;
    flex-wrap:wrap;
  }
  .social-bubble{
    width:50px;
    height:50px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(10px);
    box-shadow:0 6px 16px -6px rgba(120,132,68,0.3);
    color:var(--rose);
    text-decoration:none;
    transition:transform .3s ease, box-shadow .3s ease;
  }
  .social-bubble:nth-child(odd){ transform:translateY(-6px); }
  .social-bubble:nth-child(2){ transform:translateY(4px); }
  .social-bubble:nth-child(4){ transform:translateY(6px); }
  .social-bubble:hover{
    transform:translateY(-10px) scale(1.08);
    box-shadow:0 12px 22px -6px rgba(120,132,68,0.45);
  }

  /* ---------- section labels ---------- */
  .section-label{
    display:flex;
    align-items:center;
    gap:10px;
    margin:44px 4px 18px;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:500;
    font-size:15px;
    color:var(--ink-soft);
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:linear-gradient(90deg, var(--blush-deep), transparent);
  }

  /* ---------- bento cards ---------- */
  .bento{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  .card{
    position:relative;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(10px);
    border-radius:26px;
    padding:16px;
    text-decoration:none;
    color:var(--ink);
    box-shadow:0 10px 24px -10px rgba(130,142,78,0.3);
    transition:transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s ease;
    overflow:hidden;
  }
  .card:hover{
    transform:translateY(-6px) rotate(0deg) !important;
    box-shadow:0 16px 30px -10px rgba(130,142,78,0.45);
  }

  .card.wide{ grid-column:1 / -1; }
  .card.r1{ transform:rotate(-1.4deg); align-self:flex-start; }
  .card.r2{ transform:rotate(1.2deg); }
  .card.r3{ transform:rotate(-0.8deg); }
  .card.r4{ transform:rotate(1.6deg); }
  .card.push-right{ margin-left:18px; }
  .card.push-left{ margin-right:18px; }

  .tape{
    position:absolute;
    top:-8px;
    width:52px;
    height:18px;
    background:linear-gradient(120deg, rgba(255,255,255,0.85), rgba(200,210,150,0.65));
    border:1px solid rgba(255,255,255,0.6);
    transform:rotate(-6deg);
  }
  .tape.right{ right:22px; transform:rotate(7deg); }
  .tape.left{ left:22px; }

  .card-icon{
    width:42px;
    height:42px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    margin-bottom:10px;
  }
  .bg-rose{ background:linear-gradient(135deg,var(--rose),var(--blush-deep)); }
  .bg-lav{ background:linear-gradient(135deg,var(--lavender-deep),#7d8f4a); }
  .bg-beige{ background:linear-gradient(135deg,#cbb673,#b89a52); }
  .bg-mint{ background:linear-gradient(135deg,#a7d9c5,#6fb89a); }
  .bg-pink{ background:linear-gradient(135deg,var(--blush),var(--blush-deep)); }

  .card-title{
    font-weight:700;
    font-size:14.5px;
  }
  .card-sub{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:3px;
    line-height:1.4;
  }

  .preview{
    margin-top:12px;
    height:100px;
    border-radius:16px;
    background:linear-gradient(135deg,#f2b9c9,#d7a7ec);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .preview::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 30% 20%, rgba(255,255,255,0.5), transparent 55%);
  }
  .play{
    width:34px;
    height:34px;
    border-radius:50%;
    background:rgba(255,255,255,0.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1;
  }

  .quote-mark{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:13px;
    color:var(--ink-soft);
    margin-top:8px;
    line-height:1.5;
  }

  /* ---------- gallery ---------- */
  .gallery{
    columns:2;
    column-gap:14px;
  }
  .tile{
    break-inside:avoid;
    margin-bottom:14px;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:22px;
    box-shadow:0 8px 18px -8px rgba(130,142,78,0.35);
    transition:transform .3s ease;
  }
  .tile:hover{ transform:scale(1.03) rotate(-1deg); }
  .t1{ height:150px; background:linear-gradient(150deg,#f4c9d6,#eeb6cf); }
  .t2{ height:110px; background:linear-gradient(150deg,#e7dbf7,#cdb6ec); }
  .t3{ height:120px; background:linear-gradient(150deg,#f6e6cf,#e9c79a); }
  .t4{ height:160px; background:linear-gradient(150deg,#dcecec,#bcdcdc); }
  .t5{ height:100px; background:linear-gradient(150deg,#f7d9e6,#e3b8d4); }
  .t6{ height:130px; background:linear-gradient(150deg,#e6dcf9,#d3c2f0); }

  /* ---------- footer ---------- */
  footer{
    text-align:center;
    margin-top:52px;
    position:relative;
  }
  footer .msg{
    font-family:'Dancing Script', cursive;
    font-weight:700;
    font-size:26px;
    color:var(--rose);
  }
  footer .sub{
    margin-top:4px;
    font-size:11.5px;
    color:var(--ink-soft);
    letter-spacing:0.5px;
  }

  @media (max-width:360px){
    .username{ font-size:34px; }
    .bento{ gap:12px; }
  }
</style>
</head>
